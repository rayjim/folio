name: Build Electron App

on:
  push:
    branches:
      - feature/electron-app
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows
          path: dist/*.exe
          retention-days: 7

  build-mac:
    name: macOS (.zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify electron binary
        run: |
          node -e "const p = require('electron'); console.log('electron path:', p)"
          ls "$(node -e "process.stdout.write(require('electron'))")" || echo "binary not found"

      - name: Build macOS app
        run: npx electron-builder --mac --publish never 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        env:
          CSC_LINK: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-build-log
          path: /tmp/build.log
          retention-days: 3

      - name: Fail if build failed
        run: grep -q "✓" /tmp/build.log && exit 0 || exit 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folio-macOS
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 7
