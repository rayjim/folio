name: Build Electron App

on:
  push:
    branches:
      - feature/electron-app
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows
          path: dist/*.exe
          retention-days: 7

  build-mac:
    name: macOS (.zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify environment
        run: |
          echo "::notice::node $(node --version), npm $(npm --version)"
          echo "::notice::arch=$(uname -m), os=$(sw_vers -productVersion)"
          node -e "const p=require('electron'); console.log('::notice::electron binary:', p)"

      - name: Build macOS app
        id: build
        run: |
          npx electron-builder --mac --publish never 2>&1 | while IFS= read -r line; do
            echo "$line"
            echo "::notice::$line"
          done
          exit ${PIPESTATUS[0]}
        env:
          CSC_LINK: ""
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folio-macOS
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 7
