name: Build Windows Installer

on:
  push:
    branches: [master, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Step 1 — package app (no NSIS yet)
        run: npx electron-builder --win dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist/win-unpacked
        run: dir dist\win-unpacked
        shell: cmd

      - name: Step 2 — build NSIS installer from pre-packaged dir
        run: npx electron-builder --win nsis --prepackaged dist\win-unpacked
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows-Setup
          path: dist/*.exe
          retention-days: 30
