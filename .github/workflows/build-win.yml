name: Build Windows Installer

on:
  push:
    branches: [master, feature/**]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package app
        run: npx electron-builder --win dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build installer with Inno Setup
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' installer.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows-Setup
          path: dist/Folio-Setup-*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $exe = Get-ChildItem dist\Folio-Setup-*.exe | Select-Object -First 1 -ExpandProperty FullName
          gh release create $env:GITHUB_REF_NAME $exe --title "Folio $env:GITHUB_REF_NAME" --notes "Windows installer — see CHANGELOG.md for what changed in this version."
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
