name: Build Windows Installer

on:
  push:
    branches: [master, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (capture full output)
        id: build
        run: |
          npx electron-builder --win 2>&1 | Out-File -FilePath build-output.txt -Encoding utf8
          $exitCode = $LASTEXITCODE
          Get-Content build-output.txt
          exit $exitCode
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build output on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.txt

      - name: Upload installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Folio-Windows-Setup
          path: dist/*.exe
          retention-days: 30
